<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ID Card Generator</title>

<!-- html2canvas for download -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* FORM */
.container {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 15px;
  width: 350px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  font-weight: bold;
  cursor: pointer;
}

/* ID CARD */
#cardSection {
  display: none;
  text-align: center;
}

.id-card {
  width: 300px;
  padding: 20px;
  border-radius: 15px;
  background: linear-gradient(135deg, #1e40af, #38bdf8);
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.photo {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid white;
}

.actions button {
  margin: 5px;
  width: auto;
  padding: 10px 15px;
}
</style>
</head>

<body>

<!-- FORM -->
<div class="container" id="formSection">
  <h2>Employee Form</h2>

  <input type="text" id="empId" placeholder="Employee ID">
  <input type="text" id="name" placeholder="Name">
  <input type="date" id="dob">
  <input type="text" id="mobile" placeholder="Mobile">
  <input type="file" id="photo" accept="image/*">

  <button onclick="submitForm()">Generate ID Card</button>
</div>

<!-- CARD -->
<div id="cardSection">
  <div class="id-card" id="idCard">
    <h3>Company Name</h3>
    <img id="cardPhoto" class="photo">
    <h2 id="cardName"></h2>
    <p>ID: <span id="cardId"></span></p>
    <p>DOB: <span id="cardDob"></span></p>
    <p>Mobile: <span id="cardMobile"></span></p>
  </div>

  <div class="actions">
    <button onclick="downloadCard()">📥 Download</button>
    <button onclick="shareCard()">📤 Share</button>
    <button onclick="resetForm()">🔄 New</button>
  </div>
</div>

<script>
async function submitForm() {
  const empId = document.getElementById("empId").value;
  const name = document.getElementById("name").value;
  const dob = document.getElementById("dob").value;
  const mobile = document.getElementById("mobile").value;
  const photoFile = document.getElementById("photo").files[0];

  if (!empId || !name || !dob || !mobile || !photoFile) {
    alert("Fill all fields!");
    return;
  }

  // Show card immediately
  const photoURL = URL.createObjectURL(photoFile);

  document.getElementById("cardPhoto").src = photoURL;
  document.getElementById("cardName").innerText = name;
  document.getElementById("cardId").innerText = empId;
  document.getElementById("cardDob").innerText = dob;
  document.getElementById("cardMobile").innerText = mobile;

  document.getElementById("formSection").style.display = "none";
  document.getElementById("cardSection").style.display = "block";

  // Send to n8n
  const formData = new FormData();
  formData.append("empId", empId);
  formData.append("name", name);
  formData.append("dob", dob);
  formData.append("mobile", mobile);
  formData.append("photo", photoFile);

  fetch("https://divyansh-workflow.ifsjaipur.cloud/app/idcard", {
    method: "POST",
    body: formData
  });
}

// DOWNLOAD
function downloadCard() {
  html2canvas(document.getElementById("idCard")).then(canvas => {
    const link = document.createElement("a");
    link.download = "id-card.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

// SHARE
function shareCard() {
  html2canvas(document.getElementById("idCard")).then(canvas => {
    canvas.toBlob(async (blob) => {
      const file = new File([blob], "id-card.png", { type: "image/png" });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: "My ID Card"
        });
      } else {
        alert("Sharing not supported on this device");
      }
    });
  });
}

// RESET
function resetForm() {
  location.reload();
}
</script>

</body>
</html>
